name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p gitserver
          else
            cargo build --release --target ${{ matrix.target }} -p gitserver
          fi

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd target/${{ matrix.target }}/release
          tar czf "../../../gitserver-${VERSION}-${{ matrix.target }}.tar.gz" gitserver
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: gitserver-${{ matrix.target }}
          path: gitserver-*.tar.gz

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify tag matches crate versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          metadata=$(cargo metadata --no-deps --format-version 1)
          for crate in gitserver-core gitserver-http gitserver; do
            crate_version=$(jq -r --arg crate "$crate" '.packages[] | select(.name == $crate) | .version' <<<"$metadata")
            if [ "$crate_version" != "$VERSION" ]; then
              echo "tag version $VERSION does not match $crate version $crate_version" >&2
              exit 1
            fi
          done

      # Each published crate must trust this repository/workflow in crates.io.
      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          crate_version_published() {
            local crate="$1"
            local version="$2"

            (
              cd "$RUNNER_TEMP"
              unset CARGO_REGISTRY_TOKEN
              cargo info --registry crates-io "${crate}@${version}" >/dev/null 2>&1
            )
          }

          wait_for_crate_version() {
            local crate="$1"
            local version="$2"
            for attempt in $(seq 1 24); do
              if crate_version_published "$crate" "$version"; then
                echo "$crate $version is visible on crates.io"
                return 0
              fi

              echo "waiting for $crate $version to appear on crates.io (attempt $attempt/24)"
              sleep 10
            done

            echo "$crate $version did not appear on crates.io in time" >&2
            return 1
          }

          publish_crate() {
            local crate="$1"

            if crate_version_published "$crate" "$VERSION"; then
              echo "$crate $VERSION already published, skipping"
              return 0
            fi

            cargo publish -p "$crate" --locked
            wait_for_crate_version "$crate" "$VERSION"
          }

          publish_crate gitserver-core
          publish_crate gitserver-http
          publish_crate gitserver

  release:
    name: Release
    needs: [build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS

      - name: Generate release notes
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
